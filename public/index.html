<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary Meta -->
  <title>JerseyBasket – Jersey Grocery Price Comparison</title>
  <meta name="description" content="Compare grocery prices across CI Co-op, Morrisons, M&S, Waitrose and Iceland in Jersey, Channel Islands. Find the cheapest price on 453+ products instantly." />
  <meta name="keywords" content="Jersey groceries, Channel Islands supermarket, CI Co-op prices, Morrisons Jersey, price comparison, JerseyBasket" />
  <meta name="author" content="JerseyBasket" />
  <meta name="robots" content="index, follow" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#16a34a" />
  <meta name="color-scheme" content="dark" />
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JerseyBasket" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
  <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />

  <!-- Open Graph (for sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jerseybasket.je/" />
  <meta property="og:title" content="JerseyBasket – Jersey Grocery Price Comparison" />
  <meta property="og:description" content="Compare grocery prices across all Jersey supermarkets. 453+ products, 5 stores, always showing the cheapest price first." />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:locale" content="en_GB" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="JerseyBasket – Jersey Grocery Price Comparison" />
  <meta name="twitter:description" content="Find the cheapest groceries in Jersey, Channel Islands." />
  <meta name="twitter:image" content="/icons/icon-512.png" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CGQ6PXHN9T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CGQ6PXHN9T');
  </script>

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Splash screen background matches app -->
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      background: #050d1a;
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    #splash {
      position: fixed;
      inset: 0;
      background: #050d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-logo { font-size: 64px; }
    #splash-title { font-family: Georgia, serif; font-size: 28px; color: #f0f4f8; font-weight: 700; letter-spacing: -0.5px; }
    #splash-title span { color: #22c55e; }
    #splash-sub { font-family: Georgia, serif; font-size: 12px; color: #475569; letter-spacing: 1px; }
    #splash-dot {
      width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Splash screen shown while React loads -->
  <div id="splash">
    <div id="splash-logo">🛍️</div>
    <div id="splash-title">Jersey<span>Basket</span></div>
    <div id="splash-sub">CHANNEL ISLANDS PRICE COMPARISON</div>
    <div id="splash-dot"></div>
  </div>

  <!-- React mounts here -->
  <div id="root"></div>

  <script>
    // Hide splash when React renders
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 400);
        }
      }, 800);
    });

    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('[JerseyBasket] Service Worker registered:', reg.scope);
            setInterval(() => reg.update(), 60 * 60 * 1000);
          })
          .catch(err => console.warn('[JerseyBasket] SW registration failed:', err));
      });
    }

    function isIos() {
      return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    }
    function isInStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
    }
    if (isIos() && !isInStandaloneMode()) {
      window.__showIosInstallHint = true;
    }

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.__installPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-install-ready'));
    });

    window.addEventListener('appinstalled', () => {
      window.__installPrompt = null;
      console.log('[JerseyBasket] App installed successfully');
    });
  </script>

</body>
</html>
