<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #050d1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card {
    width: 680px;
    background: #050d1a;
    border: 2px solid #16a34a;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    font-family: Arial, sans-serif;
  }
  .site { color: #16a34a; font-size: 13px; font-weight: 700; letter-spacing: 3px; margin-bottom: 16px; }
  .title { color: #f59e0b; font-size: 48px; font-weight: 900; margin: 0; line-height: 1.1; }
  .subtitle { color: #ffffff; font-size: 22px; font-weight: 600; margin: 8px 0 24px; }
  .prize-box {
    background: #0f2d12;
    border: 2px solid #f59e0b;
    border-radius: 14px;
    padding: 20px;
    margin: 0 auto 24px;
    max-width: 400px;
  }
  .prize-amount { color: #f59e0b; font-size: 64px; font-weight: 900; line-height: 1; margin: 0; }
  .prize-label { color: #ffffff; font-size: 15px; font-weight: 600; margin-top: 6px; opacity: 0.9; }
  .choose { color: #94a3b8; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .stores { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .store { padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; }
  .coop { background: #16a34a; color: #fff; }
  .morrisons { background: #eab308; color: #000; }
  .ms { background: #475569; color: #fff; }
  .waitrose { background: #0d9488; color: #fff; }
  .iceland { background: #dc2626; color: #fff; }
  .dates { color: #94a3b8; font-size: 12px; margin-bottom: 10px; }
  .url { color: #16a34a; font-size: 13px; font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="site">JERSEYBASKET.JE</div>
  <div class="title">June Price Hunt</div>
  <div class="subtitle">Competition</div>
  <div class="prize-box">
    <div class="prize-amount">£10</div>
    <div class="prize-label">Gift Voucher — store of your choice</div>
  </div>
  <div class="choose">Choose from any of these stores:</div>
  <div class="stores">
    <div class="store coop">🌿 CI Co-op</div>
    <div class="store morrisons">🛒 Morrisons</div>
    <div class="store ms">✨ M&S Food</div>
    <div class="store waitrose">🌱 Waitrose</div>
    <div class="store iceland">🧊 Iceland</div>
  </div>
  <div class="dates">Submit a price • Closes 30 June midnight • Winner announced 1 July</div>
  <div class="url">jerseybasket.je</div>
</div>
</body>
</html>
